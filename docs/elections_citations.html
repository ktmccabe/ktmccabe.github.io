CTIONS_SYLLABUS", "sections": ["Minority Voices?"], "section": "Minority Voices?", "optional": true, "year": "2000", "authors": "Politics,", "full_citation": "Politics, 2000, 34(September).", "scholar_url": "https://scholar.google.com/scholar?q=Politics+2000+34(September)."}];
const PAGE_SIZE = 50;
let filtered = [], page = 1;

const searchEl = document.getElementById('search');
const themeEl  = document.getElementById('themeFilter');
const yearEl   = document.getElementById('yearInput');
const mainEl   = document.getElementById('main');
const pagEl    = document.getElementById('pagination');
const barEl    = document.getElementById('resultsBar');

function highlight(text, query) {
  if (!query) return escHtml(text);
  const re = new RegExp('(' + query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return escHtml(text).replace(re, '<mark style="background:#dcc6ff;border-radius:2px">$1</mark>');
}
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function applyFilters() {
  const q  = searchEl.value.trim().toLowerCase();
  const th = themeEl.value;
  const yr = yearEl.value.trim();
  filtered = RAW.filter(c => {
    if (th && !(c.sections||[c.section]).includes(th)) return false;
    if (yr && c.year !== yr) return false;
    if (q && !(c.full_citation||'').toLowerCase().includes(q)) return false;
    return true;
  });
  page = 1;
  render();
}

function render() {
  const start = (page-1)*PAGE_SIZE;
  const slice = filtered.slice(start, start+PAGE_SIZE);
  const q = searchEl.value.trim();
  barEl.textContent = `Showing ${filtered.length} citation${filtered.length!==1?'s':''}`;
  if (!filtered.length) {
    mainEl.innerHTML = '<div id="noResults">No citations match your filters.</div>';
    pagEl.innerHTML = '';
    return;
  }
  mainEl.innerHTML = slice.map(c => {
    const secs = c.sections||[c.section];
    const tags = secs.map(s => `<span class="tag tag-theme">${escHtml(s)}</span>`).join('');
    const yr = c.year ? `<span class="tag tag-year">${escHtml(c.year)}</span>` : '';
    const opt = c.optional ? `<span class="tag tag-optional">Optional</span>` : '';
    const scholar = c.scholar_url
      ? `<a class="scholar-link" href="${escHtml(c.scholar_url)}" target="_blank" rel="noopener">🔍 Google Scholar</a>`
      : '';
    return `<div class="card">
  <div class="card-citation">${highlight(c.full_citation, q)}</div>
  <div class="card-tags">${tags}${yr}${scholar}</div>
</div>`;
  }).join('');
  renderPagination();
}

function renderPagination() {
  const total = Math.ceil(filtered.length / PAGE_SIZE);
  if (total <= 1) { pagEl.innerHTML=''; return; }
  let btns = `<button class="page-btn" onclick="goPage(${page-1})" ${page===1?'disabled':''}>‹ Prev</button>`;
  const range = new Set([1,total,page,page-1,page+1].filter(n=>n>=1&&n<=total));
  let prev=0;
  [...range].sort((a,b)=>a-b).forEach(n => {
    if (prev && n-prev>1) btns += `<span style="padding:0 .3rem;color:#999">…</span>`;
    btns += `<button class="page-btn${n===page?' active':''}" onclick="goPage(${n})">${n}</button>`;
    prev=n;
  });
  btns += `<button class="page-btn" onclick="goPage(${page+1})" ${page===total?'disabled':''}>Next ›</button>`;
  pagEl.innerHTML = btns;
}

function goPage(n) { page=n; render(); window.scrollTo({top:0,behavior:'smooth'}); }

function resetFilters() {
  searchEl.value=''; themeEl.value=''; yearEl.value='';
  applyFilters();
}

let debounce;
searchEl.addEventListener('input', ()=>{ clearTimeout(debounce); debounce=setTimeout(applyFilters,220); });
themeEl.addEventListener('change', applyFilters);
yearEl.addEventListener('input', ()=>{ clearTimeout(debounce); debounce=setTimeout(applyFilters,300); });

applyFilters();
</script>
